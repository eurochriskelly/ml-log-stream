
[PARSER]
    Name        error_parser
    Format      regex
    Regex       ^(?<time>(.+?)(?=[a-zA-Z]))(?<log_level>(.+?)(?=:))(.+?)(?=[a-zA-Z])(?<log>.*)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L

[PARSER]
    Name        ml_port_type_parser
    Format      regex
    Regex       ^(?:(?<port>\d{4})_)?(?<type>Error|Access|Request)Log\.txt$

[PARSER]
    Name        json_parser
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S%z

[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

[PARSER]
    Name        logfmt
    Format      logfmt

[PARSER]
    Name         docker
    Format       json
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L
    Time_Keep    On
    # --
    # Since Fluent Bit v1.2, if you are parsing Docker logs and using
    # the Kubernetes filter, it's no longer required to decode the
    # 'log' key.
    #
    # Command      |  Decoder | Field | Optional Action
    # =============|==========|=======|=================
    # Decode_Field_As    json     log

[PARSER]
    Name        docker-daemon
    Format      regex
    Regex       time="(?<time>[^ ]*)" level=(?<level>[^ ]*) msg="(?<msg>[^ ].*)"
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]{1,5})\>1 (?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[-0-9]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*?)\]|-)) (?<message>.+)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        syslog-rfc3164-local
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       /^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$/
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        mongodb
    Format      regex
    Regex       ^(?<time>[^ ]*)\s+(?<severity>\w)\s+(?<component>[^ ]+)\s+\[(?<context>[^\]]+)]\s+(?<message>.*?) *(?<ms>(\d+))?(:?ms)?$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

[PARSER]
    Name        envoy
    Format      regex
    Regex       ^\[(?<start_time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)? (?<protocol>\S+)" (?<code>[^ ]*) (?<response_flags>[^ ]*) (?<bytes_received>[^ ]*) (?<bytes_sent>[^ ]*) (?<duration>[^ ]*) (?<x_envoy_upstream_service_time>[^ ]*) "(?<x_forwarded_for>[^ ]*)" "(?<user_agent>[^\"]*)" "(?<request_id>[^\"]*)" "(?<authority>[^ ]*)" "(?<upstream_host>[^ ]*)"
    Time_Key    start_time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        istio-envoy-proxy
    Format      regex
    Regex       ^\[(?<start_time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)? (?<protocol>\S+)" (?<response_code>[^ ]*) (?<response_flags>[^ ]*) (?<response_code_details>[^ ]*) (?<connection_termination_details>[^ ]*) (?<upstream_transport_failure_reason>[^ ]*) (?<bytes_received>[^ ]*) (?<bytes_sent>[^ ]*) (?<duration>[^ ]*) (?<x_envoy_upstream_service_time>[^ ]*) "(?<x_forwarded_for>[^ ]*)" "(?<user_agent>[^\"]*)" "(?<x_request_id>[^\"]*)" (?<authority>[^ ]*)" "(?<upstream_host>[^ ]*)" (?<upstream_cluster>[^ ]*) (?<upstream_local_address>[^ ]*) (?<downstream_local_address>[^ ]*) (?<downstream_remote_address>[^ ]*) (?<requested_server_name>[^ ]*) (?<route_name>[^ ]*)
    Time_Key    start_time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        cri
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        kube-custom
    Format      regex
    Regex       (?<tag>[^.]+)?\.?(?<pod_name>[a-z0-9](?:[-a-z0-9]*[a-z0-9])?(?:\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)_(?<namespace_name>[^_]+)_(?<container_name>.+)-(?<docker_id>[a-z0-9]{64})\.log$

###########################
### MarkLogic Parsers:  ###
###########################


[PARSER]
    Name        ml_memory_line_parser
    Format      regex
    Regex       ^(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>Memory (?<PercentageUsed>\d+)% phys=(?<Physical>\d+) size=(?<MemorySize>\d+)\((?<MemorySizePercentage>\d+)%\)( rss=(?<RSS>\d+)\((?<RSSPercentage>\d+)%\))?( huge=(?<Huge>\d+)\((?<HugePercentage>\d+)%\))?( anon=(?<Anon>\d+)\((?<AnonPercentage>\d+)%\))?( swap=(?<Swap>\d+)\((?<SwapPercentage>\d+)%\))?( file=(?<File>\d+)\((?<FilePercentage>\d+)%\))?( forest=(?<Forest>\d+)\((?<ForestPercentage>\d+)%\))?( cache=(?<Cache>\d+)\((?<CachePercentage>\d+)%\))?( registry=(?<Registry>\d+)\((?<RegistryPercentage>\d+)%\))?)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Zone   Europe/Amsterdam
    Types       PercentageUsed:integer Physical:integer MemorySize:integer MemorySizePercentage:integer RSS:integer RSSPercentage:integer Huge:integer HugePercentage:integer Anon:integer AnonPercentage:integer Swap:integer SwapPercentage:integer File:integer FilePercentage:integer Forest:integer ForestPercentage:integer Cache:integer CachePercentage:integer Registry:integer RegistryPercentage:integer

[PARSER]
    Name        ml_slow_infra_line_parser
    Format      regex
    Regex       ^(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>Slow (?<Type>(.+?)(?=\s))\s(?<Item>(.+?)(?=,)),\s((?<What>(.*))\sin\s)?(?<Seconds>(\d+\.?\d*e?\+?\d*)(?=\s))\s(?<Unit>(\w+))$)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Types       Seconds:float

[PARSER]
    Name        ml_filename_shortener
    Format      regex
    Regex       ^(?<file_path>.*)/(?<file>.*)$

[PARSER]
    Name        ml_access_log_parser
    Format      regex
    Regex       ^(?<ip_address>[^ ]+) - (?<username>[^ ]+) \[(?<time>[^\]]+)\] "(?<method>[A-Z]+) (?<url>[^\s]+) (?<protocol>[^\"]+)" (?<status_code>\d+) (?<response_size>\d+) "(?<referer>[^\"]*)" "(?<user_agent>[^\"]*)"
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z
    Preserve_Key On
    Reserve_Data On

# ml_error only
#
[PARSER]
    Name        ml_error_line_parser
    Format      regex
    Regex       ^(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>.*)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0100

[PARSER]
    Name        ml_error_memory_parser
    Format      regex
    Regex       ^(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>Memory (?<PercentageUsed>\d+)% phys=(?<Physical>\d+) size=(?<MemorySize>\d+)\((?<MemorySizePercentage>\d+)%\)( rss=(?<RSS>\d+)\((?<RSSPercentage>\d+)%\))?( huge=(?<Huge>\d+)\((?<HugePercentage>\d+)%\))?( anon=(?<Anon>\d+)\((?<AnonPercentage>\d+)%\))?( swap=(?<Swap>\d+)\((?<SwapPercentage>\d+)%\))?( file=(?<File>\d+)\((?<FilePercentage>\d+)%\))?( forest=(?<Forest>\d+)\((?<ForestPercentage>\d+)%\))?( cache=(?<Cache>\d+)\((?<CachePercentage>\d+)%\))?( registry=(?<Registry>\d+)\((?<RegistryPercentage>\d+)%\))?)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0100
    Types       PercentageUsed:integer Physical:integer MemorySize:integer MemorySizePercentage:integer RSS:integer RSSPercentage:integer Huge:integer HugePercentage:integer Anon:integer AnonPercentage:integer Swap:integer SwapPercentage:integer File:integer FilePercentage:integer Forest:integer ForestPercentage:integer Cache:integer CachePercentage:integer Registry:integer RegistryPercentage:integer

[PARSER]
    Name        ml_error_infra_parser
    Format      regex
    Regex       /(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>Slow\s(?<Type>(.+?)(?=\s))\s(?<Item>(.+?)(?=,)),\s((?<What>(.*))\sin\s)?(?<Seconds>(\d+\.?\d*e?\+?\d*)(?=\s))\s(?<Unit>(\w+))$)/m
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0100
    Types       Seconds:float

[PARSER]
    Name        ml_error_memory_threshold_parser
    Format      regex
    Regex       /(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(Warning)(?=:))(:\s+)(?<Message>Memory\slow:.*?=(?<MemoryThreshold>\d+)%phys)/m
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0100
    Types       MemoryThreshold:integer

[PARSER]
    Name        ml_error_catchall_parser
    Format      regex
    Regex       /(?<time>(\d+-\d+-\d+\s\d+:\d+:\d+\.\d+)(?=\s))\s(?<Level>(.+?)(?=:))(:\s+)(?<Message>(.*))/m
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0100

# Multiline parser
#
[MULTILINE_PARSER]
    Name          ml_error_multiline_parser
    Type          regex
    Flush_Timeout 1000
    #
    # Regex rules for multiline parsing
    # ---------------------------------
    #
    # Configuration hints:
    #
    #  - First state always has the name: start_state
    #  - Every field in the rule must be inside double quotes
    #
    # Rules |   State Name  | Regex Pattern                                  | Next State
    # ------|---------------|------------------------------------------------|-----------
    Rule      "start_state"   "/^(.+?)(?=[a-zA-Z])(.+?)(?=:)(:\s+)(.*)/"      "cont"
    Rule      "cont"          "/^(.+?)(?=[a-zA-Z])(.+?)(?=:)(:\+)(.*)/"       "cont"

